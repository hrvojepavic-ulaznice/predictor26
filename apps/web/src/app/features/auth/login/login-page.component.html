<section class="auth-page" aria-labelledby="login-title">
  <div class="auth-panel">
    <h1 id="login-title">Login</h1>

    <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="login()">
      <label class="field">
        <span>Username</span>
        <input appFormFieldState="required" type="text" formControlName="username" autocomplete="username" maxlength="40" />
      </label>

      <label class="field">
        <span>Password</span>
        <input appFormFieldState="required" type="password" formControlName="password" autocomplete="current-password" maxlength="128" />
      </label>

      <p class="form-error" [class.form-error-visible]="errorMessage()">{{ errorMessage() || '&nbsp;' }}</p>

      <button class="submit-button" type="submit" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Logging in...' : 'Login' }}
      </button>
    </form>
  </div>
</section>
