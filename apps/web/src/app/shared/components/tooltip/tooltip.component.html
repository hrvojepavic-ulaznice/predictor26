<span class="tooltip-trigger" tabindex="0" [attr.aria-label]="text">
  <ng-content />
  <span class="tooltip-panel" [class.tooltip-top]="placement === 'top'" [class.tooltip-right]="placement === 'right'" [class.tooltip-bottom]="placement === 'bottom'" [class.tooltip-bottom-end]="placement === 'bottom-end'" [class.tooltip-left]="placement === 'left'">
    {{ text }}
  </span>
</span>
