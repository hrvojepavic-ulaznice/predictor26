<section class="auth-page" aria-labelledby="login-title">
  <div class="auth-panel">
    <h1 id="login-title">Login</h1>

    <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="login()">
      <label class="field">
        <span>Username</span>
        <input
          #usernameInput
          appFormFieldState="required"
          type="text"
          formControlName="username"
          name="username"
          autocomplete="username"
          autocapitalize="none"
          autocorrect="off"
          spellcheck="false"
          maxlength="40"
        />
      </label>

      <label class="field">
        <span>Password</span>
        <input
          #passwordInput
          appFormFieldState="required"
          type="password"
          formControlName="password"
          name="password"
          autocomplete="current-password"
          maxlength="128"
        />
      </label>

      <p class="form-error" [class.form-error-visible]="errorMessage()">{{ errorMessage() || '&nbsp;' }}</p>

      <button class="submit-button" type="submit" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Logging in...' : 'Login' }}
      </button>
    </form>
  </div>
</section>
