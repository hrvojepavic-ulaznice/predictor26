name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: |
          cd apps/web
          npm ci
          npm run build

      - run: |
          cd apps/api
          npm ci
          npm run build

      - name: Package
        run: |
          tar -czf release.tar.gz \
            apps \
            package.json \
            package-lock.json

      - name: SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.PI_SSH_KEY }}" \
            > ~/.ssh/id_ed25519

          chmod 600 ~/.ssh/id_ed25519

      - name: Upload
        run: |
          scp \
            -o StrictHostKeyChecking=no \
            release.tar.gz \
            webdev@${{ secrets.PI_HOST }}:/tmp/

      - name: Deploy
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            webdev@${{ secrets.PI_HOST }} \
            "/opt/predictor26/deploy.sh"
