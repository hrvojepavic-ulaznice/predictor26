@if (points(); as result) {
  <span
    class="points-value"
    [attr.aria-label]="title()"
    [attr.title]="title()"
    [style.color]="color()"
  >
    @if (result.earned === null) {
      ?
    } @else {
      {{ result.earned | number: '1.0-2' }}
    }
    / {{ result.available | number: '1.0-2' }}
  </span>
}
