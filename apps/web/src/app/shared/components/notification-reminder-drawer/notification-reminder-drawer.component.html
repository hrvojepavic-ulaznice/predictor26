@if (visible()) {
  <div class="drawer-backdrop" role="presentation" animate.enter="drawer-enter" animate.leave="drawer-leave">
    <section
      class="notification-drawer"
      role="dialog"
      aria-modal="true"
      aria-labelledby="notification-reminder-title"
      aria-describedby="notification-reminder-description"
    >
      <div class="drawer-copy">
        <p class="section-label">Prediction reminders</p>
        <h2 id="notification-reminder-title">Get deadline reminders</h2>
        <p id="notification-reminder-description">
          We will remind you 9 hours and 1 hour before each round locks.
        </p>
      </div>

      <div class="drawer-actions" aria-label="Notification reminder choices">
        <button class="secondary-button" type="button" (click)="skipNotifications()">Not now</button>
        <button class="primary-button" type="button" [disabled]="requestingPermission()" (click)="allowNotifications()">
          {{ requestingPermission() ? 'Opening permission...' : 'Allow notifications' }}
        </button>
      </div>
    </section>
  </div>
}
