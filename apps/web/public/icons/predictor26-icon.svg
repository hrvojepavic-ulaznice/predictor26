<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Drone bee holding a trophy - front view, celebratory pose -->

  <!-- === TROPHY === -->
  <g transform="translate(100, 42)">
    <!-- Trophy cup -->
    <path d="M-18,-20 Q-20,-20 -20,-16 L-16,6 Q-14,12 0,14 Q14,12 16,6 L20,-16 Q20,-20 18,-20 Z" fill="#ffd700" stroke="#c8a200" stroke-width="1.2"/>
    <!-- Trophy shine -->
    <path d="M-12,-16 Q-10,-8 -8,4" stroke="#fff4a0" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- Trophy handles -->
    <path d="M-18,-12 Q-28,-10 -28,-2 Q-28,6 -18,6" stroke="#c8a200" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M18,-12 Q28,-10 28,-2 Q28,6 18,6" stroke="#c8a200" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Trophy stem -->
    <rect x="-3" y="14" width="6" height="10" rx="1" fill="#e6be00" stroke="#c8a200" stroke-width="0.8"/>
    <!-- Trophy base -->
    <rect x="-12" y="24" width="24" height="5" rx="2" fill="#e6be00" stroke="#c8a200" stroke-width="0.8"/>
    <!-- Number 26 on trophy -->
    <text x="0" y="-2" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#fff4a0" opacity="0.8">26</text>
  </g>

  <!-- === ARMS holding trophy === -->
  <!-- Left arm -->
  <path d="M72 112 Q68 95 82 72" stroke="#c48d00" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left hand gripping base -->
  <circle cx="83" cy="70" r="4" fill="#e6a800"/>

  <!-- Right arm -->
  <path d="M128 112 Q132 95 118 72" stroke="#c48d00" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right hand gripping base -->
  <circle cx="117" cy="70" r="4" fill="#e6a800"/>

  <!-- === WINGS === -->
  <ellipse cx="62" cy="100" rx="26" ry="11" fill="#e0eeff" stroke="#a0c0e0" stroke-width="0.8" opacity="0.65" transform="rotate(-25 62 100)"/>
  <ellipse cx="138" cy="100" rx="26" ry="11" fill="#e0eeff" stroke="#a0c0e0" stroke-width="0.8" opacity="0.65" transform="rotate(25 138 100)"/>

  <!-- === BEE BODY === -->
  <!-- Thorax -->
  <ellipse cx="100" cy="115" rx="18" ry="15" fill="#f0b400" stroke="#c48d00" stroke-width="1.2"/>

  <!-- Abdomen -->
  <ellipse cx="100" cy="148" rx="22" ry="24" fill="#f0b400" stroke="#c48d00" stroke-width="1.2"/>
  <!-- Stripes -->
  <path d="M80 138 Q100 135 120 138" stroke="#222" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M78 148 Q100 145 122 148" stroke="#222" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M80 158 Q100 155 120 158" stroke="#222" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Stinger -->
  <path d="M100 172 L100 178" stroke="#333" stroke-width="2" stroke-linecap="round"/>

  <!-- === HEAD === -->
  <circle cx="100" cy="95" r="17" fill="#f0b400" stroke="#c48d00" stroke-width="1.2"/>

  <!-- Large compound eyes -->
  <ellipse cx="91" cy="92" rx="7" ry="9" fill="#222"/>
  <ellipse cx="91" cy="92" rx="5.5" ry="7" fill="#2a2a2a"/>
  <circle cx="89" cy="89" r="2.2" fill="#555"/>

  <ellipse cx="109" cy="92" rx="7" ry="9" fill="#222"/>
  <ellipse cx="109" cy="92" rx="5.5" ry="7" fill="#2a2a2a"/>
  <circle cx="107" cy="89" r="2.2" fill="#555"/>

  <!-- Antennae -->
  <path d="M93 79 Q88 65 82 60" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="81" cy="59" r="2.2" fill="#333"/>
  <path d="M107 79 Q112 65 118 60" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="119" cy="59" r="2.2" fill="#333"/>

  <!-- Happy mouth -->
  <path d="M94 102 Q100 108 106 102" stroke="#333" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- === LEGS === -->
  <!-- Left leg -->
  <path d="M88 168 Q82 185 78 198" stroke="#c48d00" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M78 198 L72 202 L82 202 Z" fill="#a07000"/>

  <!-- Right leg -->
  <path d="M112 168 Q118 185 122 198" stroke="#c48d00" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M122 198 L118 202 L128 202 Z" fill="#a07000"/>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="204" rx="35" ry="4" fill="#000" opacity="0.08"/>
</svg>
