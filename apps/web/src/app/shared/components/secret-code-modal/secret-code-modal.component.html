<form class="secret-code-form" [formGroup]="secretCodeForm" (ngSubmit)="confirm()">
  <header class="modal-header">
    <h2 id="secret-code-title">{{ title() }}</h2>
    <button class="icon-button" type="button" aria-label="Close" [disabled]="isSubmitting()" (click)="cancel()">×</button>
  </header>

  <div class="modal-content">
    <label class="field">
      <span>{{ label() }}</span>
      <input
          type="password"
          autocomplete="current-password"
          maxlength="128"
          autofocus
          appFormFieldState="required"
          formControlName="secretCode"
          [readonly]="isSubmitting()"
        />
    </label>

    <p class="form-error" [class.form-error-visible]="errorMessage()">{{ errorMessage() || '&nbsp;' }}</p>
  </div>

  <footer class="modal-footer">
    <button class="secondary-button" type="button" [disabled]="isSubmitting()" (click)="cancel()">{{ cancelLabel() }}</button>
    <button class="confirm-button" type="submit" [disabled]="isSubmitting() || secretCodeForm.invalid">
      {{ isSubmitting() ? 'Checking...' : confirmLabel() }}
    </button>
  </footer>
</form>
