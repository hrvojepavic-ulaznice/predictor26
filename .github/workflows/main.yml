name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Package
        run: |
          tar -czf release.tar.gz \
              --exclude=.git \
              --exclude=node_modules \
              --exclude=dist \
              --exclude=.angular \
              --exclude=coverage \
              apps \
              scripts \
              package.json \
              package-lock.json \
              tsconfig.json

      - name: SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.PI_SSH_KEY }}" \
            > ~/.ssh/id_ed25519

          chmod 600 ~/.ssh/id_ed25519

      - name: Upload
        run: |
          scp \
            -o StrictHostKeyChecking=no \
            release.tar.gz \
            webdev@${{ secrets.PI_HOST }}:/tmp/

      - name: Deploy
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            webdev@${{ secrets.PI_HOST }} \
            "/opt/predictor26/deploy.sh && bash /opt/predictor26/current/scripts/ensure-api-env.sh && sudo /usr/local/bin/predictor26-restart"
