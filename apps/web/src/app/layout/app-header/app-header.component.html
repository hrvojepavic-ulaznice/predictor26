<header class="site-header">
  <a class="brand" routerLink="/" aria-label="Predictor26 home">
    <img class="brand-icon" src="icons/predictor26-icon.svg" alt="" width="34" height="34" />
    <span class="brand-name">Predictor26</span>
  </a>

  <nav class="account-nav" aria-label="Account">
    @if (appState.currentUser(); as user) {
      <span class="user-pill">
        <a class="user-name" routerLink="/my-predictions" aria-label="View my predictions">{{ user.username }}</a>
        @if (user.isVerified) {
          <app-tooltip class="verified-tooltip" text="Verified user!">
            <img class="verified-badge" src="icons/verified-badge.svg" alt="" width="18" height="23" aria-hidden="true" />
          </app-tooltip>
        }
      </span>
      @if (user.role === 'super_admin' || user.role === 'admin') {
        <a class="nav-link" routerLink="/admin">Admin</a>
      }
      <button class="nav-link nav-button" type="button" (click)="logout()">Logout</button>
    } @else {
      <a class="nav-link" routerLink="/login">Login</a>
      <a class="nav-link nav-link-primary" routerLink="/register">Register</a>
    }
  </nav>
</header>
