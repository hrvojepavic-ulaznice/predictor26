<form class="username-form" [formGroup]="usernameForm" (ngSubmit)="confirm()">
  <header class="modal-header">
    <h2 id="username-modal-title">Edit username</h2>
    <button class="icon-button" type="button" aria-label="Close" [disabled]="isSubmitting()" (click)="cancel()">×</button>
  </header>

  <div class="modal-content">
    <label class="field">
      <span>Username</span>
      <input
        type="text"
        name="username"
        autocomplete="username"
        autocapitalize="none"
        autocorrect="off"
        spellcheck="false"
        maxlength="40"
        autofocus
        appFormFieldState="invalid"
        formControlName="username"
        [readonly]="isSubmitting()"
      />
    </label>

    <label class="field">
      <span>What is the secret code?</span>
      <input
        type="password"
        autocomplete="current-password"
        maxlength="128"
        appFormFieldState="required"
        formControlName="secretCode"
        [readonly]="isSubmitting()"
      />
    </label>

    <p class="form-error" [class.form-error-visible]="errorMessage()">{{ errorMessage() || '&nbsp;' }}</p>
  </div>

  <footer class="modal-footer">
    <button class="secondary-button" type="button" [disabled]="isSubmitting()" (click)="cancel()">Cancel</button>
    <button class="confirm-button" type="submit" [disabled]="isSubmitting() || usernameForm.invalid">
      {{ isSubmitting() ? 'Saving...' : 'Save username' }}
    </button>
  </footer>
</form>
